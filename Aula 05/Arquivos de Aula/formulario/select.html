<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>select HTML</title>
</head>
<body>
    
    <h2>Selecione a sua comida</h2>
    <form action="">
        <select name="comida" id=""><!-- name gera uma variável -->
            <option value="macarao">Macarrão</option>
            <option value="pizza">Pizza</option>
            <option value="feijoada">Feijoada</option>
        </select> 

        <button type="submit">Enviar</button>


    </form>

</body>
</html>
