<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    
    <!-- Como fazer um formulario que contenha nome e sobrenome? -->
     <form action=""> <!-- Inicia um formulário -->

        <label for="id_nome">Nome:</label> <!-- Descrição do campo -->
        <input type="text" id="id_nome"> <!-- Gera a caixnha para digitar -->

        <label for="id_sobrenome">Sobrenome: </label>
        <input type="text" id="id_sobrenome"> <!-- Tipo texto - é para textos de forma geral -->

        <label for="id_senha">Senha:</label>
        <input type="password" id="id_senha">

        <button type="submit">Enviar</button> <!-- Submit - Enviar -->
        <button type="reset">Limpar</button> <!-- Reset - Limpar o formulario -->

     </form>


</body>
</html>
