<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>StepStyle - Loja de Sapatos</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="container">

        <header class="header">
            <h1>StepStyle</h1>
            <nav class="menu">
                <a href="#">Início</a>
                <a href="#">Masculino</a>
                <a href="#">Feminino</a>
                <a href="#contato">Contato</a>
            </nav><!--  -->
        </header>

        <section class="banner">
            <h2>Nova Coleção 2026</h2>
        </section>

        <main class="products">
            <section class="card">
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="Tênis 1">
                <h3>Tênis Esportivo</h3>
                <p>R$ 199,90</p>
            </section>

            <section class="card">
                <img src="https://pixabay.com/get/gbe39c0b3834fce09a32307252d27ebe56e297e6b7170616967a7c42cebb80aa16fc2987bc4796fae61dd10dd105e7f9124f9e0fe3dd81e2de5d2062e44b1b593_1920.jpg" alt="Tênis 2">
                <h3>Tênis Casual</h3>
                <p>R$ 149,90</p>
            </section>

            <section class="card">
                <img src="https://pixabay.com/get/g74cd270d297912022ffe347ac24cdf766262d040f0d5598c4829f3727476d3923674b5c90ef072c6a273954c67c25f873e338fafd3069e27d1030c739ee4651e_1920.jpg" alt="Tênis 3">
                <h3>Sapato Social</h3>
                <p>R$ 249,90</p>
            </section>

            <section class="card">
                <img src="https://pixabay.com/get/g653d6432a92e3adb06133962627d1ed37fc9edda1f5aa6fd2d2af5c6d734ab6af1956dc47114efa2f14c958a63243f948d911be7fad8bd8f58c8f013e4ebbc90_1920.jpg" alt="Tênis 4">
                <h3>Tênis Street</h3>
                <p>R$ 179,90</p>
            </section>

            <section class="card">
                <img src="https://pixabay.com/get/gd0ff558d3009824864fcb097071c067d9474d2251c15e6c79d04a976377e22d8f754abf1aea837509a3e352e5ae4cfb6e83854ea529de31acde164d4b11de1d4_1920.jpg" alt="Tênis 5">
                <h3>Tênis Street</h3>
                <p>R$ 179,90</p>
            </section>

            <section class="card">
                <img src="https://pixabay.com/get/g5e034c195ee748eeada1073b660139c8201ec1a697ff829fdde63e4468b3b10c06e87d97655f22fac0e27f969b8767c491945996156f12ccb88a73627bd18847_1920.png" alt="Tênis 6">
                <h3>Sapato Feminino</h3>
                <p>R$ 379,90</p>
            </section>

            <section id="contato"  class="formulario">
                <h2>Contato</h2>
                <form action="">
                    <input type="text" placeholder="Insira seu nome">
                    <input type="text" placeholder="email@email.com.br">
                    <input type="fone" placeholder="(99)99999-9999">
                    <button type="submit">Enviar</button>
                </form>
            </section>
        </main>

        <footer class="footer">
            <p>© 2026 StepStyle - Todos os direitos reservados</p>
        </footer>

    </div>

</body>

</html>
