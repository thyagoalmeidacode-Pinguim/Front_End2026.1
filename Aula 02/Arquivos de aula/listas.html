<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Lista Ordenada(Numerada tag OL)</h1>

    <ol> <!-- Gera a lista (Papel onde escrevo os itens)-->
        <li>Arroz</li> <!-- Item da lista -->
        <li>Feijão</li>
        <li>Batata</li>
    </ol>

    <h1>Lista não Ordenada UL</h1>
    <ul>
        <li>Cenoura</li>
        <li>Macarrõa</li>
        <li>Melancia</li>
    </ul>

    <h1>Links com lista</h1>
    <ol>
        <li><a href="">Home</a></li>
    </ol>

</body>
</html>
