<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <title>StepStyle - Seus pés em alto nível</title>
  </head>

  <body>
    <!-- Cabeçalho  -->
    <header>
      <div class="menu">
        <svg viewBox="0 0 100 80" width="30" height="30">
          <rect class="line line1" width="100" height="10"></rect>
          <rect class="line line2" y="30" width="100" height="10"></rect>
          <rect class="line line3" y="60" width="100" height="10"></rect>
        </svg>
      </div>
      <div class="logo">
        <img src="img/logo.png" alt="Logo da Empresa">      
        <!-- Logo da Empresa -->
      </div>
    </header>

    <!-- Corpo da nossa pagina (Conteudo da pagina) -->
    <main>
      <section>
        <div class="banner">
          <img src="img/banner.png" alt="" />          
        </div>
        <div>
          <h2>"Conforto e estilo para seu dia a dia"</h2>
          <button>Ver produtos</button>
        </div>
      </section>

      <section>
        <h2>Destaques</h2>

        <div>
         <!--  <img src="img/produto_um.png" alt="tenis masculino" /> -->
          <h2>Tenis Masculino</h2>
          <p>R$ 200,00</p>
          <button>Comprar</button>
        </div>

        <div>
          <!-- <img src="img/produto_dois.png" alt="tenis masculino" /> -->
          <h2>Sapato Masculino</h2>
          <p>R$ 200,00</p>
          <button>Comprar</button>
        </div>

        <div>
          <!-- <img src="img/produto_tres.png" alt="tenis masculino" /> -->
          <h2>Sapato Feminino</h2>
          <p>R$ 200,00</p>
          <button>Comprar</button>
        </div>
      </section>

      <section>
        <h2>Sobre</h2>
      </section>
    </main>

    <!-- Rodapé -->
    <footer>
      <section>
        <p>@ 2026 StepStyle</p>
      </section>
    </footer>
  </body>
</html>
