<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <title>StepStyle - Seus pés em alto nível</title>
  </head>

  <body>
    <!-- Cabeçalho  -->
    <header>
      <div>
        <h1>[ StepStyle ]</h1>
        <!-- Logo da Empresa -->
      </div>

      <nav>
        <!-- Lnks para navegação -->
        <a href="">[ Página inicial ] </a>
        <!-- A tag a é a tag de link -->
        <a href="">[ Produtos ]</a>
        <a href="">[ Contato ]</a>
      </nav>
    </header>

    <!-- Corpo da nossa pagina (Conteudo da pagina) -->
    <main>
      <section>
        <div>
          <img src="img/banner.png" alt="" />
          <!-- Tag de imagenm -->
        </div>
        <div>
          <h2>"Conforto e estilo para seu dia a dia"</h2>
          <button>Ver produtos</button>
        </div>
      </section>

      <section>
        <h2>Destaques</h2>

        <div>
          <img src="img/produto_um.png" alt="tenis masculino" />
          <h2>Tenis Masculino</h2>
          <p>R$ 200,00</p>
          <button>Comprar</button>
        </div>

        <div>
            <img src="img/produto_dois.png" alt="tenis masculino" />
            <h2>Sapato Masculino</h2>
            <p>R$ 200,00</p>
            <button>Comprar</button>
        </div>
       
        <div>
            <img src="img/produto_tres.png" alt="tenis masculino" />
            <h2>Sapato Feminino</h2>
            <p>R$ 200,00</p>
            <button>Comprar</button>
        </div>
      </section>

      <section>
        <h2>Sobre</h2>
      </section>
    </main>

    <!-- Rodapé -->
    <footer>
      <section>
        <p>@ 2026 StepStyle</p>
      </section>
    </footer>
  </body>
</html>
