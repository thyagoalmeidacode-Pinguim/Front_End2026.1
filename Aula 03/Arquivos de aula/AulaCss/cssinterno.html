<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS Interno - Coloca a tag style no head -->
    <style>
        body{
            background-color: blueviolet;
        }
      
        p{
            color: red;
            font-size: 50px;
        }

        .p_dois{
            color: white;
            font-size: 20px;
        }
    </style>
    <title>Document</title>
</head>
<body>
    <p>
        Este é o css interno
    </p>

    <p class="p_dois">
        Segundo texto CSS interno
    </p>

     <p>
        Terceiro texto CSS interno
    </p>
</body>
</html>
